name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Dummies para o build: rotas coletadas estaticamente podem tocar env.
      DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
      AUTH_SECRET: "ci-secret-apenas-para-build-0123456789abcdef"
      NEXTAUTH_SECRET: "ci-secret-apenas-para-build-0123456789abcdef"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build web
        run: npm run web:build
