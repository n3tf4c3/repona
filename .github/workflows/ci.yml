name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissão mínima do GITHUB_TOKEN: só leitura do repo. Reduz o blast radius se
# um passo/dep for comprometido. Actions pinadas por SHA (imutável) em vez de tag
# móvel, e passo de auditoria de dependências (gate em critical). (auditoria #96)
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Fixa a geração do runner; a imagem hospedada recebe patches do GitHub,
    # mas não muda silenciosamente para a próxima versão do Ubuntu.
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Dummies para o build: rotas coletadas estaticamente podem tocar env.
      DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
      AUTH_SECRET: "ci-secret-apenas-para-build-0123456789abcdef"
      NEXTAUTH_SECRET: "ci-secret-apenas-para-build-0123456789abcdef"
      INVITE_TOKEN_SECRET: "ci-invite-token-secret-0123456789abcdef"
      ADMIN_SECRET: "ci-admin-secret-0123456789abcdef012345"
      NEXTAUTH_URL: "https://ci.repona.invalid"
      RATE_LIMIT_PEPPER: "ci-rate-limit-pepper-0123456789abcdef"
    steps:
      # Actions pinadas por SHA (o comentário registra a versão legível). Uma tag
      # como @v4 é móvel e pode ser reapontada para código malicioso; o SHA é
      # imutável. (auditoria #96)
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Validar contrato do ambiente de produção
        run: npm run env:check:production

      # Os transitivos vulneráveis de Next/Expo/Drizzle usam overrides mínimos e
      # validados; o gate em MODERATE impede a regressão silenciosa do #35.
      - name: Audit (moderate)
        run: npm audit --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build web
        run: npm run web:build

  # Baseline do banco reproduzível (auditoria #23): garante que o schema.ts aplica
  # do zero num Postgres limpo e que o baseline Drizzle commitado continua em
  # sincronia com o schema.ts (sem drift). O fluxo canônico é db:push (schema.ts é
  # a fonte de verdade); este job prova que o baseline reflete o schema atual.
  db-schema:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    services:
      postgres:
        # Tag legível + digest imutável do manifest multiarch.
        image: postgres:16.14@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      # 1) A cadeia inteira aplica limpa num Postgres efêmero (DDL + backfills).
      - name: Aplicar migrations no Postgres efêmero
        run: |
          for migration in apps/web/drizzle/*.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$migration"
          done

      - name: Testar integrações PostgreSQL
        env:
          TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:5432/postgres"
        run: npx tsx --test "apps/web/src/**/*.integration.test.ts"

      # 2) Sem drift: drizzle-kit generate não deve produzir migration nova — se
      # produzir, alguém mudou schema.ts sem regenerar o baseline (npm run
      # db:generate). git status suja e o job falha.
      - name: Baseline em sincronia com schema.ts
        run: |
          cd apps/web
          npx drizzle-kit generate --config drizzle.config.ts
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "Baseline dessincronizado do schema.ts. Rode: npm run db:generate -w web"
            git status --porcelain drizzle
            exit 1
          fi
